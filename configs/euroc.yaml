dataset:
  type: euroc
  base_path: "F:/_AAA_FILE_ALL/_AAA_CODE_ALL/VINS_ALL/myVO_ws/datasets"
  sequences:
    - MH_01_easy
    - MH_04_difficult
  camera: cam0

camera:
  model: pinhole
  width: 752
  height: 480
  fx: 458.654
  fy: 457.296
  cx: 367.215
  cy: 248.375
  distortion:
    model: radtan
    k1: -0.28340811
    k2: 0.07395907
    p1: 0.00019359
    p2: 1.76187114e-05

# FAST detector
fast:
  threshold: 20
  nms_radius: 4
  max_keypoints: 500
  grid_size: 8          # grid-based NMS cell size

# KLT tracker
klt:
  num_levels: 4
  win_size: 21
  max_iterations: 30
  epsilon: 0.01
  min_eig_threshold: 1.0e-4

# ORB descriptor
orb:
  patch_size: 31
  n_pairs: 256          # rBRIEF pairs
  scale_factor: 1.2
  n_levels: 8

# Feature matcher
matcher:
  ratio_threshold: 0.75
  cross_check: true

# VO pipeline
vo:
  min_tracked_points: 50
  keyframe_min_distance: 0.1   # meters
  keyframe_min_angle: 5.0      # degrees
  keyframe_min_tracked_ratio: 0.7
  init_min_parallax: 2.0       # degrees
  triangulate_min_parallax: 1.0

# Evaluation
eval:
  align: "sim3"                # sim3 | se3 | posyaw | none
  output_tum: true
